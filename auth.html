<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Access | Audrey&Co</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <header>
        <div class="logo">Audrey&Co</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Shop</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="auth.html">Login</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="auth-container">
            <div class="auth-card">
                
                <div id="login-form-section">
                    <h2>Log In</h2>
                    <form id="login-form">
                        <div class="form-group">
                            <label for="login-email">Email Address</label>
                            <input type="email" id="login-email" placeholder="name@example.com" required>
                        </div>
                        <div class="form-group">
                            <label for="login-password">Password</label>
                            <input type="password" id="login-password" placeholder="••••••••" required>
                        </div>
                        
                        <button type="submit" class="btn auth-btn">Log In</button>
                    </form>
                    
                    <div class="auth-toggle">
                        Don't have an account? <a id="go-to-register">Register here</a>
                    </div>
                </div>

                <div id="register-form-section" class="hidden">
                    <h2>Create Account</h2>
                    <form id="register-form">
                        <div class="form-group">
                            <label for="register-name">Your Name</label>
                            <input type="text" id="register-name" placeholder="Enter your name" required>
                        </div>

                        <div class="form-group">
                            <label for="register-email">Email Address</label>
                            <input type="email" id="register-email" placeholder="name@example.com" required>
                        </div>

                        <div class="form-group">
                            <label for="register-password">Password</label>
                            <input type="password" id="register-password" placeholder="At least 6 characters" minlength="6" required>
                        </div>

                        <button type="submit" class="btn auth-btn">Register</button>
                    </form>
                    
                    <div class="auth-toggle">
                        Already have an account? <a id="go-to-login">Log in here</a>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Audrey&Co. Handcrafted with love.</p>
        <div class="social-links">
            <a href="#">Facebook</a>
            <a href="#">Instagram</a>
            <a href="#">Twitter</a>
        </div>
    </footer>

    <script>
        const loginSection = document.getElementById("login-form-section");
        const registerSection = document.getElementById("register-form-section");
        const goToRegisterLink = document.getElementById("go-to-register");
        const goToLoginLink = document.getElementById("go-to-login");
        const loginForm = document.getElementById("login-form");
        const registerForm = document.getElementById("register-form");

        goToRegisterLink.addEventListener("click", () => {
            loginSection.classList.add("hidden"); 
            registerSection.classList.remove("hidden");
        });

        goToLoginLink.addEventListener("click", () => {
            registerSection.classList.add("hidden"); 
            loginSection.classList.remove("hidden");
        });

        registerForm.addEventListener("submit", function(event) {
            event.preventDefault();

            const name = document.getElementById("register-name").value.trim();

            alert("Account created successfully, " + name + "! You can now log in. 🐰");

            registerForm.reset();

            registerSection.classList.add("hidden");
            loginSection.classList.remove("hidden");
        });

        loginForm.addEventListener("submit", function(event) {
            event.preventDefault();

            alert("Welcome back! You are now logged into Audrey&Co. 🐰");
            
            loginForm.reset();
        });
    </script>
</body>
</html>
